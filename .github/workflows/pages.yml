name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inject chat API key from secret
        env:
          SPECTRAL_LLM_KEY: ${{ secrets.SPECTRAL_LLM_KEY }}
        run: |
          if [ -n "$SPECTRAL_LLM_KEY" ]; then
            cat > chat-config.local.js <<EOF
          /** Generated at deploy — not in git */
          window.CHAT_CONFIG = {
            apiUrl: 'https://api-dev.spectralstudios.ai/web/llm',
            model: 'gpt-4o-mini',
            key: '${SPECTRAL_LLM_KEY}'
          };
          EOF
          fi

      - name: Upload site
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
